<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Shield with lock - cybersecurity theme -->
  <!-- Background glow -->
  <ellipse cx="150" cy="150" rx="90" ry="100" fill="#fce7f3" opacity="0.4"/>
  <!-- Shield shape -->
  <path d="M150 55 L230 90 L225 180 Q210 235 150 260 Q90 235 75 180 L70 90Z"
        fill="#fce7f3" stroke="#db2777" stroke-width="2.5"/>
  <!-- Shield inner border -->
  <path d="M150 72 L218 102 L214 178 Q200 222 150 245 Q100 222 86 178 L82 102Z"
        fill="#fbcfe8" stroke="#db2777" stroke-width="1" opacity="0.5"/>
  <!-- Lock body -->
  <rect x="122" y="145" width="56" height="45" rx="6" fill="#f9a8d4" stroke="#db2777" stroke-width="2"/>
  <!-- Lock shackle -->
  <path d="M130 145 L130 125 Q130 105 150 105 Q170 105 170 125 L170 145"
        stroke="#db2777" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="150" cy="163" r="8" fill="#db2777"/>
  <rect x="147" y="167" width="6" height="12" rx="2" fill="#db2777"/>
  <!-- Binary/data streams -->
  <text x="42" y="100" font-family="monospace" font-size="9" fill="#f9a8d4" opacity="0.7">01</text>
  <text x="38" y="118" font-family="monospace" font-size="9" fill="#f9a8d4" opacity="0.5">10</text>
  <text x="44" y="136" font-family="monospace" font-size="9" fill="#f9a8d4" opacity="0.6">01</text>
  <text x="248" y="105" font-family="monospace" font-size="9" fill="#f9a8d4" opacity="0.7">11</text>
  <text x="252" y="123" font-family="monospace" font-size="9" fill="#f9a8d4" opacity="0.5">00</text>
  <text x="246" y="141" font-family="monospace" font-size="9" fill="#f9a8d4" opacity="0.6">10</text>
  <!-- Check mark badge -->
  <circle cx="215" cy="80" r="14" fill="#34d399" stroke="white" stroke-width="2.5"/>
  <path d="M208 80 L213 85 L222 75" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <path d="M55 60 L57 66 L63 68 L57 70 L55 76 L53 70 L47 68 L53 66Z" fill="#f9a8d4"/>
  <path d="M245 55 L247 60 L252 62 L247 64 L245 69 L243 64 L238 62 L243 60Z" fill="#fbcfe8"/>
  <path d="M35 200 L37 205 L42 207 L37 209 L35 214 L33 209 L28 207 L33 205Z" fill="#fce7f3"/>
  <path d="M265 195 L267 200 L272 202 L267 204 L265 209 L263 204 L258 202 L263 200Z" fill="#f9a8d4"/>
</svg>