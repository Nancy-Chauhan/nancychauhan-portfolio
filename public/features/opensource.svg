<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Git fork/merge visualization - open source theme -->
  <!-- Background glow -->
  <circle cx="150" cy="150" r="95" fill="#d1fae5" opacity="0.3"/>
  <!-- Main branch line -->
  <line x1="150" y1="40" x2="150" y2="260" stroke="#059669" stroke-width="3"/>
  <!-- Branch 1 - fork left -->
  <path d="M150 80 Q110 95 90 130" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Branch 1 - merge back -->
  <path d="M90 130 Q110 165 150 180" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Branch 2 - fork right -->
  <path d="M150 120 Q200 140 220 170" stroke="#6ee7b7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Branch 2 - merge back -->
  <path d="M220 170 Q200 200 150 220" stroke="#6ee7b7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Branch 3 - small fork left -->
  <path d="M150 170 Q120 180 105 200" stroke="#a7f3d0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Commit nodes on main -->
  <circle cx="150" cy="60" r="8" fill="#059669" stroke="white" stroke-width="2"/>
  <circle cx="150" cy="120" r="8" fill="#059669" stroke="white" stroke-width="2"/>
  <circle cx="150" cy="180" r="8" fill="#059669" stroke="white" stroke-width="2"/>
  <circle cx="150" cy="240" r="8" fill="#059669" stroke="white" stroke-width="2"/>
  <!-- Commit nodes on branches -->
  <circle cx="90" cy="130" r="7" fill="#34d399" stroke="white" stroke-width="2"/>
  <circle cx="220" cy="170" r="7" fill="#6ee7b7" stroke="white" stroke-width="2"/>
  <circle cx="105" cy="200" r="6" fill="#a7f3d0" stroke="white" stroke-width="2"/>
  <!-- PR merge icons -->
  <circle cx="150" cy="80" r="5" fill="white" stroke="#059669" stroke-width="1.5"/>
  <circle cx="150" cy="220" r="5" fill="white" stroke="#059669" stroke-width="1.5"/>
  <!-- People/contributor avatars -->
  <circle cx="45" cy="90" r="14" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="45" cy="85" r="5" fill="#34d399"/>
  <path d="M35 98 Q45 92 55 98" stroke="#34d399" stroke-width="1.5" fill="none"/>
  <circle cx="255" cy="120" r="14" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="255" cy="115" r="5" fill="#6ee7b7"/>
  <path d="M245 128 Q255 122 265 128" stroke="#6ee7b7" stroke-width="1.5" fill="none"/>
  <circle cx="60" cy="235" r="14" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="60" cy="230" r="5" fill="#a7f3d0"/>
  <path d="M50 243 Q60 237 70 243" stroke="#a7f3d0" stroke-width="1.5" fill="none"/>
  <!-- Connection lines to contributors -->
  <line x1="59" y1="90" x2="83" y2="120" stroke="#34d399" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="241" y1="130" x2="227" y2="160" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="72" y1="225" x2="100" y2="205" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- Sparkles -->
  <path d="M200 50 L202 56 L208 58 L202 60 L200 66 L198 60 L192 58 L198 56Z" fill="#6ee7b7"/>
  <path d="M80 40 L82 45 L87 47 L82 49 L80 54 L78 49 L73 47 L78 45Z" fill="#a7f3d0"/>
  <path d="M250 230 L252 235 L257 237 L252 239 L250 244 L248 239 L243 237 L248 235Z" fill="#d1fae5"/>
  <!-- Heart -->
  <path d="M148 260 Q148 255 143 255 Q138 255 138 260 Q138 265 148 272 Q158 265 158 260 Q158 255 153 255 Q148 255 148 260Z" fill="#f472b6" opacity="0.7"/>
</svg>